<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELISEO v6.0 ZONAHACK - Panel de Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 30px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0,255,136,0.3);
        }
        
        .header .status {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(0,255,136,0.15);
            border: 1px solid #00ff88;
            color: #00ff88;
            font-size: 14px;
        }
        
        .dashboard {
            padding: 20px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0,255,136,0.1);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,255,136,0.1);
            border-color: #00ff88;
        }
        
        .card .icon {
            font-size: 32px;
            margin-bottom: 10px;
            color: #00ff88;
        }
        
        .card .value {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .card .label {
            color: #888;
            font-size: 14px;
        }
        
        .main-content {
            padding: 0 30px 30px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        
        .panel {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(0,255,136,0.1);
        }
        
        .panel h2 {
            color: #00ff88;
            margin-bottom: 20px;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .bot-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 3px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .bot-item .info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .bot-item .name {
            font-weight: bold;
            color: #fff;
        }
        
        .bot-item .token {
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }
        
        .bot-status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
        }
        
        .bot-status.active {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }
        
        .bot-status.inactive {
            background: rgba(255,0,0,0.2);
            color: #ff4444;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            margin: 2px;
        }
        
        .btn-primary {
            background: #00ff88;
            color: #0a0a0f;
        }
        
        .btn-primary:hover {
            background: #00cc77;
            transform: scale(1.05);
        }
        
        .btn-danger {
            background: #ff4444;
            color: white;
        }
        
        .btn-danger:hover {
            background: #cc0000;
        }
        
        .btn-warning {
            background: #ffaa00;
            color: #0a0a0f;
        }
        
        .btn-warning:hover {
            background: #cc8800;
        }
        
        .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
        }
        
        .add-bot-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .add-bot-form input {
            flex: 1;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            min-width: 200px;
        }
        
        .add-bot-form input:focus {
            outline: none;
            border-color: #00ff88;
        }
        
        .raid-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .raid-controls input, .raid-controls select {
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
        }
        
        .raid-controls input:focus, .raid-controls select:focus {
            outline: none;
            border-color: #00ff88;
        }
        
        .raid-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .log-container {
            max-height: 300px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            padding: 10px;
        }
        
        .log-entry {
            font-size: 12px;
            font-family: monospace;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        
        .log-entry .time {
            color: #666;
        }
        
        .log-entry .msg {
            color: #00ff88;
        }
        
        .ip-log {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .ip-log .ip {
            font-family: monospace;
            color: #00ccff;
        }
        
        .ip-log .country {
            color: #ffaa00;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }
        ::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1><i class="fas fa-skull"></i> ELISEO v6.0 ZONAHACK</h1>
        <div class="status">
            <span class="status-badge"><i class="fas fa-circle" style="color: #00ff88;"></i> ONLINE</span>
            <span class="status-badge"><i class="fas fa-microchip"></i> <span id="workersCount">0</span> Workers</span>
            <span class="status-badge"><i class="fas fa-robot"></i> <span id="botsCount">0</span> Bots</span>
        </div>
    </header>
    
    <!-- Dashboard -->
    <div class="dashboard">
        <div class="card">
            <div class="icon"><i class="fas fa-envelope"></i></div>
            <div class="value" id="totalMessages">0</div>
            <div class="label">Mensajes Enviados</div>
        </div>
        <div class="card">
            <div class="icon"><i class="fas fa-bolt"></i></div>
            <div class="value" id="totalRaids">0</div>
            <div class="label">RAIDs Realizados</div>
        </div>
        <div class="card">
            <div class="icon"><i class="fas fa-robot"></i></div>
            <div class="value" id="totalBots">0</div>
            <div class="label">Bots Registrados</div>
        </div>
        <div class="card">
            <div class="icon"><i class="fas fa-network-wired"></i></div>
            <div class="value" id="activeWorkers">0</div>
            <div class="label">Workers Activos</div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Left Panel -->
        <div>
            <!-- Bots Panel -->
            <div class="panel">
                <h2><i class="fas fa-robot"></i> Gestión de Bots</h2>
                
                <div class="add-bot-form">
                    <input type="text" id="botToken" placeholder="Token del Bot" required>
                    <input type="text" id="botName" placeholder="Nombre del Bot" value="Bot_ELISEO">
                    <button class="btn btn-primary" onclick="addBot()">Agregar Bot</button>
                </div>
                
                <div id="botList"></div>
            </div>
            
            <!-- Raid Controls -->
            <div class="panel" style="margin-top: 20px;">
                <h2><i class="fas fa-bolt"></i> Control de RAIDs</h2>
                <div class="raid-controls">
                    <select id="raidBot" style="grid-column: span 2;">
                        <option value="">Seleccionar Bot</option>
                    </select>
                    <input type="text" id="raidChannel" placeholder="ID del Canal">
                    <input type="number" id="raidCount" placeholder="Mensajes" value="1000">
                    <input type="number" id="raidWorkers" placeholder="Workers" value="10">
                    <input type="text" id="raidMessage" placeholder="Mensaje" style="grid-column: span 2;" value="RAID MASSIVE by ELISEO v6.0 🔥">
                </div>
                <div class="raid-actions">
                    <button class="btn btn-primary" onclick="startRaid()">
                        <i class="fas fa-play"></i> Iniciar RAID
                    </button>
                    <button class="btn btn-warning" onclick="stopRaid()">
                        <i class="fas fa-stop"></i> Detener
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div>
            <!-- IP Detection -->
            <div class="panel">
                <h2><i class="fas fa-shield-alt"></i> Detección de IP</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="ipToCheck" placeholder="IP a verificar (opcional)" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0;">
                    <button class="btn btn-primary" onclick="detectIP()">Detectar</button>
                </div>
                <div id="ipResult" style="background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-bottom: 15px; display: none;"></div>
                
                <h3 style="color: #00ccff; font-size: 14px; margin-bottom: 10px;">
                    <i class="fas fa-list"></i> Últimas IPs Detectadas
                </h3>
                <div class="log-container" id="ipLogs"></div>
            </div>
            
            <!-- System Logs -->
            <div class="panel" style="margin-top: 20px;">
                <h2><i class="fas fa-terminal"></i> Logs del Sistema</h2>
                <div class="log-container" id="systemLogs">
                    <div class="log-entry"><span class="time">[INIT]</span> <span class="msg">ELISEO v6.0 iniciado correctamente</span></div>
                    <div class="log-entry"><span class="time">[INIT]</span> <span class="msg">Sistema de detección de IP activo</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Estado local (simulado)
        let bots = [];
        let stats = {
            total_messages: 0,
            total_raids: 0,
            total_bots: 0,
            active_workers: 0
        };
        let ipLogs = [];
        let raidActive = false;

        // Función para añadir log
        function addLog(message) {
            const logs = document.getElementById('systemLogs');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="time">[${time}]</span> <span class="msg">${message}</span>`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }

        // Función para añadir IP log
        function addIPLog(ip, country, city, isp) {
            const container = document.getElementById('ipLogs');
            const entry = document.createElement('div');
            entry.className = 'ip-log';
            entry.innerHTML = `
                <span class="ip">${ip}</span>
                <span class="country">${country} - ${city}</span>
                <span style="font-size: 11px; color: #666;">${isp}</span>
            `;
            container.insertBefore(entry, container.firstChild);
            if (container.children.length > 10) {
                container.removeChild(container.lastChild);
            }
        }

        // Función para actualizar estadísticas
        function updateStats() {
            document.getElementById('totalMessages').textContent = stats.total_messages;
            document.getElementById('totalRaids').textContent = stats.total_raids;
            document.getElementById('totalBots').textContent = stats.total_bots;
            document.getElementById('activeWorkers').textContent = stats.active_workers;
            document.getElementById('workersCount').textContent = stats.active_workers;
            document.getElementById('botsCount').textContent = stats.total_bots;
        }

        // Función para renderizar bots
        function renderBots() {
            const container = document.getElementById('botList');
            if (bots.length === 0) {
                container.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">No hay bots registrados</div>';
                return;
            }

            container.innerHTML = bots.map(bot => `
                <div class="bot-item">
                    <div class="info">
                        <span class="name">${bot.name}</span>
                        <span class="token">${bot.token.substring(0, 20)}...</span>
                        <span class="bot-status ${bot.status}">${bot.status}</span>
                        ${bot.is_running ? `<span style="color: #00ff88; font-size: 12px;"><i class="fas fa-circle"></i> ${bot.channels || 0} canales</span>` : ''}
                    </div>
                    <div>
                        ${bot.status === 'inactive' ? 
                            `<button class="btn btn-primary btn-sm" onclick="startBot(${bot.id})"><i class="fas fa-play"></i></button>` :
                            `<button class="btn btn-warning btn-sm" onclick="stopBot(${bot.id})"><i class="fas fa-stop"></i></button>`
                        }
                        <button class="btn btn-danger btn-sm" onclick="deleteBot(${bot.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');

            // Actualizar select de raids
            const select = document.getElementById('raidBot');
            const activeBots = bots.filter(b => b.status === 'active');
            select.innerHTML = '<option value="">Seleccionar Bot</option>' + 
                activeBots.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
        }

        // Función para añadir bot (simulado)
        async function addBot() {
            const token = document.getElementById('botToken').value;
            const name = document.getElementById('botName').value || 'Bot_ELISEO';
            
            if (!token) {
                alert('Ingresa un token de bot válido');
                return;
            }

            // Simular add
            const newBot = {
                id: Date.now(),
                token: token,
                name: name,
                status: 'inactive',
                is_running: false,
                channels: 0
            };
            
            bots.push(newBot);
            stats.total_bots = bots.length;
            
            document.getElementById('botToken').value = '';
            renderBots();
            updateStats();
            addLog(`Bot ${name} agregado correctamente`);
        }

        // Función para iniciar bot (simulado)
        async function startBot(id) {
            const bot = bots.find(b => b.id === id);
            if (!bot) return;
            
            bot.status = 'active';
            bot.is_running = true;
            bot.channels = Math.floor(Math.random() * 10) + 1;
            
            renderBots();
            updateStats();
            addLog(`Bot ${bot.name} iniciado`);
        }

        // Función para detener bot (simulado)
        async function stopBot(id) {
            const bot = bots.find(b => b.id === id);
            if (!bot) return;
            
            bot.status = 'inactive';
            bot.is_running = false;
            bot.channels = 0;
            
            renderBots();
            updateStats();
            addLog(`Bot ${bot.name} detenido`);
        }

        // Función para eliminar bot (simulado)
        async function deleteBot(id) {
            if (!confirm('¿Estás seguro de eliminar este bot?')) return;
            
            bots = bots.filter(b => b.id !== id);
            stats.total_bots = bots.length;
            
            renderBots();
            updateStats();
            addLog(`Bot eliminado`);
        }

        // Función para iniciar RAID (simulado)
        async function startRaid() {
            const botId = parseInt(document.getElementById('raidBot').value);
            const channelId = document.getElementById('raidChannel').value;
            const count = parseInt(document.getElementById('raidCount').value) || 1000;
            const workers = parseInt(document.getElementById('raidWorkers').value) || 10;
            const message = document.getElementById('raidMessage').value || 'RAID MASSIVE by ELISEO v6.0 🔥';

            if (!botId || !channelId) {
                alert('Selecciona un bot y un canal');
                return;
            }

            if (raidActive) {
                alert('Ya hay un RAID en curso');
                return;
            }

            raidActive = true;
            stats.active_workers = workers;
            
            // Simular envío de mensajes
            addLog(`🚀 RAID iniciado en canal ${channelId} con ${workers} workers`);
            addLog(`📝 Mensaje: ${message.substring(0, 50)}...`);
            
            // Simular progreso
            let sent = 0;
            const interval = setInterval(() => {
                const increment = Math.floor(Math.random() * 100) + 50;
                sent += increment;
                if (sent >= count) {
                    clearInterval(interval);
                    raidActive = false;
                    stats.total_raids++;
                    stats.total_messages += count;
                    stats.active_workers = 0;
                    updateStats();
                    addLog(`✅ RAID completado: ${count} mensajes enviados`);
                } else {
                    stats.total_messages += increment;
                    updateStats();
                }
            }, 500);
        }

        // Función para detener RAID (simulado)
        async function stopRaid() {
            if (!raidActive) {
                alert('No hay ningún RAID activo');
                return;
            }
            
            raidActive = false;
            stats.active_workers = 0;
            updateStats();
            addLog('⛔ RAID detenido manualmente');
        }

        // Función para detectar IP
        async function detectIP() {
            const ip = document.getElementById('ipToCheck').value || '187.189.120.235';
            
            // Simular geolocalización
            const mockData = {
                '187.189.120.235': {
                    country: 'México',
                    city: 'Ciudad de México',
                    isp: 'Telmex',
                    lat: 19.4326,
                    lon: -99.1332,
                    risk: 15
                },
                '8.8.8.8': {
                    country: 'Estados Unidos',
                    city: 'Mountain View',
                    isp: 'Google LLC',
                    lat: 37.422,
                    lon: -122.084,
                    risk: 5
                },
                '1.1.1.1': {
                    country: 'Australia',
                    city: 'Sydney',
                    isp: 'Cloudflare',
                    lat: -33.8688,
                    lon: 151.2093,
                    risk: 5
                }
            };

            const geo = mockData[ip] || {
                country: 'Desconocido',
                city: 'Desconocida',
                isp: 'Desconocido',
                lat: 0,
                lon: 0,
                risk: Math.floor(Math.random() * 100)
            };

            // Mostrar resultado
            const resultDiv = document.getElementById('ipResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <div><strong>IP:</strong> <span style="color: #00ccff;">${ip}</span></div>
                    <div><strong>País:</strong> ${geo.country}</div>
                    <div><strong>Ciudad:</strong> ${geo.city}</div>
                    <div><strong>ISP:</strong> ${geo.isp}</div>
                    <div><strong>Coord:</strong> ${geo.lat}, ${geo.lon}</div>
                    <div><strong>Riesgo:</strong> <span style="color: ${geo.risk > 50 ? '#ff4444' : '#00ff88'}">${geo.risk}%</span></div>
                </div>
            `;

            // Añadir a logs de IP
            addIPLog(ip, geo.country, geo.city, geo.isp);
            addLog(`IP detectada: ${ip} (${geo.country})`);
            document.getElementById('ipToCheck').value = '';
        }

        // Inicializar
        function init() {
            // Agregar algunos bots de ejemplo
            bots = [
                { id: 1, token: 'MTIzNDU2Nzg5MDEyMzQ1Njc4OQ', name: 'Bot_ELISEO_1', status: 'inactive', is_running: false, channels: 0 },
                { id: 2, token: 'OTg3NjU0MzIxMDk4NzY1NDMyMQ', name: 'Bot_ELISEO_2', status: 'inactive', is_running: false, channels: 0 }
            ];
            stats.total_bots = bots.length;
            stats.total_messages = 45231;
            stats.total_raids = 12;
            
            renderBots();
            updateStats();
            
            // Agregar algunos IP logs de ejemplo
            addIPLog('187.189.120.235', 'México', 'Ciudad de México', 'Telmex');
            addIPLog('8.8.8.8', 'Estados Unidos', 'Mountain View', 'Google LLC');
            addIPLog('1.1.1.1', 'Australia', 'Sydney', 'Cloudflare');
            
            addLog('Panel de control cargado correctamente');
            addLog('Sistema listo para operaciones');
        }

        // Auto-refresh stats (simulado)
        setInterval(() => {
            if (!raidActive) {
                // Pequeñas variaciones para simular actividad
                stats.total_messages += Math.floor(Math.random() * 5);
                updateStats();
            }
        }, 3000);

        // Iniciar
        init();

        // Función para actualizar el select de bots cuando cambia
        document.addEventListener('DOMContentLoaded', () => {
            // Refresh del select cada 5 segundos
            setInterval(() => {
                const activeBots = bots.filter(b => b.status === 'active');
                const select = document.getElementById('raidBot');
                const currentValue = select.value;
                select.innerHTML = '<option value="">Seleccionar Bot</option>' + 
                    activeBots.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
                if (currentValue) {
                    select.value = currentValue;
                }
            }, 5000);
        });
    </script>
</body>
</html>
