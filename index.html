<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELISEO v6.0 ZONAHACK - Panel de Control</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ... (mantener los estilos existentes) ... */
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1><i class="fas fa-skull"></i> ELISEO v6.0 ZONAHACK</h1>
        <div class="status">
            <span class="status-badge"><i class="fas fa-circle" style="color: #00ff88;"></i> ONLINE</span>
            <span class="status-badge"><i class="fas fa-microchip"></i> <span id="workersCount">0</span> Workers</span>
            <span class="status-badge"><i class="fas fa-robot"></i> <span id="botsCount">0</span> Bots</span>
        </div>
    </header>
    
    <!-- Dashboard -->
    <div class="dashboard">
        <div class="card">
            <div class="icon"><i class="fas fa-envelope"></i></div>
            <div class="value" id="totalMessages">0</div>
            <div class="label">Mensajes Enviados</div>
        </div>
        <div class="card">
            <div class="icon"><i class="fas fa-bolt"></i></div>
            <div class="value" id="totalRaids">0</div>
            <div class="label">RAIDs Realizados</div>
        </div>
        <div class="card">
            <div class="icon"><i class="fas fa-robot"></i></div>
            <div class="value" id="totalBots">0</div>
            <div class="label">Bots Registrados</div>
        </div>
        <div class="card">
            <div class="icon"><i class="fas fa-network-wired"></i></div>
            <div class="value" id="activeWorkers">0</div>
            <div class="label">Workers Activos</div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <!-- Left Panel -->
        <div>
            <!-- Bots Panel -->
            <div class="panel">
                <h2><i class="fas fa-robot"></i> Gestión de Bots</h2>
                
                <div class="add-bot-form">
                    <input type="text" id="botToken" placeholder="Token del Bot" required>
                    <input type="text" id="botName" placeholder="Nombre del Bot" value="Bot_ELISEO">
                    <button class="btn btn-primary" onclick="addBot()">Agregar Bot</button>
                </div>
                
                <div id="botList"></div>
            </div>
            
            <!-- Raid Controls -->
            <div class="panel" style="margin-top: 20px;">
                <h2><i class="fas fa-bolt"></i> Control de RAIDs</h2>
                <div class="raid-controls">
                    <select id="raidBot" style="grid-column: span 2;">
                        <option value="">Seleccionar Bot</option>
                    </select>
                    <input type="text" id="raidChannel" placeholder="ID del Canal">
                    <input type="number" id="raidCount" placeholder="Mensajes" value="1000">
                    <input type="number" id="raidWorkers" placeholder="Workers" value="10">
                    <input type="text" id="raidMessage" placeholder="Mensaje" style="grid-column: span 2;" value="RAID MASSIVE by ELISEO v6.0 🔥">
                </div>
                <div class="raid-actions">
                    <button class="btn btn-primary" onclick="startRaid()">
                        <i class="fas fa-play"></i> Iniciar RAID
                    </button>
                    <button class="btn btn-warning" onclick="stopRaid()">
                        <i class="fas fa-stop"></i> Detener
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Right Panel -->
        <div>
            <!-- IP Detection -->
            <div class="panel">
                <h2><i class="fas fa-shield-alt"></i> Detección de IP</h2>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="ipToCheck" placeholder="IP a verificar (opcional)" style="flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #e0e0e0;">
                    <button class="btn btn-primary" onclick="detectIP()">Detectar</button>
                </div>
                <div id="ipResult" style="background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-bottom: 15px; display: none;"></div>
                
                <h3 style="color: #00ccff; font-size: 14px; margin-bottom: 10px;">
                    <i class="fas fa-list"></i> Últimas IPs Detectadas
                </h3>
                <div class="log-container" id="ipLogs"></div>
            </div>
            
            <!-- System Logs -->
            <div class="panel" style="margin-top: 20px;">
                <h2><i class="fas fa-terminal"></i> Logs del Sistema</h2>
                <div class="log-container" id="systemLogs">
                    <div class="log-entry"><span class="time">[INIT]</span> <span class="msg">ELISEO v6.0 iniciado correctamente</span></div>
                    <div class="log-entry"><span class="time">[INIT]</span> <span class="msg">Sistema de detección de IP activo</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // NUEVO: Backend real con Discord API y gestión avanzada de bots
        // ============================================================

        // Clase para manejar bots de Discord
        class DiscordBot {
            constructor(token, name) {
                this.token = token;
                this.name = name;
                this.id = Date.now();
                this.status = 'inactive';
                this.is_running = false;
                this.channels = [];
                this.guilds = [];
                this.user = null;
                this.interval = null;
                this.raidInterval = null;
                this.isRaiding = false;
            }

            // Iniciar el bot (conexión a Discord)
            async start() {
                try {
                    const response = await fetch('https://discord.com/api/v10/users/@me', {
                        headers: {
                            'Authorization': `Bot ${this.token}`
                        }
                    });

                    if (!response.ok) {
                        throw new Error('Token inválido');
                    }

                    const userData = await response.json();
                    this.user = userData;
                    this.status = 'active';
                    this.is_running = true;

                    // Obtener guilds y canales
                    await this.loadGuilds();
                    this.updateUI();
                    
                    return { success: true, user: userData };
                } catch (error) {
                    this.status = 'error';
                    this.is_running = false;
                    return { success: false, error: error.message };
                }
            }

            // Detener el bot
            stop() {
                this.is_running = false;
                this.status = 'inactive';
                this.channels = [];
                this.guilds = [];
                if (this.interval) clearInterval(this.interval);
                this.updateUI();
            }

            // Cargar guilds y canales del bot
            async loadGuilds() {
                try {
                    const response = await fetch('https://discord.com/api/v10/users/@me/guilds', {
                        headers: {
                            'Authorization': `Bot ${this.token}`
                        }
                    });

                    if (response.ok) {
                        const guilds = await response.json();
                        this.guilds = guilds.map(g => g.name);
                        
                        // Simular canales
                        this.channels = guilds.map(g => ({
                            id: g.id,
                            name: g.name,
                            type: 'text'
                        }));
                    }
                } catch (error) {
                    console.error('Error loading guilds:', error);
                }
            }

            // Enviar mensaje a un canal
            async sendMessage(channelId, message) {
                try {
                    const response = await fetch(`https://discord.com/api/v10/channels/${channelId}/messages`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bot ${this.token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            content: message
                        })
                    });

                    return response.ok;
                } catch (error) {
                    return false;
                }
            }

            // Iniciar un RAID
            startRaid(channelId, message, count, workers) {
                if (this.isRaiding) return false;
                
                this.isRaiding = true;
                let sent = 0;
                let failed = 0;

                this.raidInterval = setInterval(() => {
                    if (sent >= count) {
                        this.stopRaid();
                        return;
                    }

                    // Enviar mensaje
                    this.sendMessage(channelId, message).then(success => {
                        if (success) {
                            sent++;
                            stats.total_messages++;
                            updateStats();
                            addLog(`📨 Mensaje enviado por ${this.name} (${sent}/${count})`);
                        } else {
                            failed++;
                        }
                    });

                    // Actualizar progreso cada 10 mensajes
                    if (sent % 10 === 0) {
                        document.getElementById('raidProgress').textContent = `Enviados: ${sent}/${count}`;
                    }

                }, 1000 / workers); // Control de velocidad

                return true;
            }

            // Detener RAID
            stopRaid() {
                if (this.raidInterval) {
                    clearInterval(this.raidInterval);
                    this.raidInterval = null;
                }
                this.isRaiding = false;
                addLog(`⛔ RAID detenido para ${this.name}`);
            }

            updateUI() {
                // Actualizar interfaz
                renderBots();
                updateStats();
            }
        }

        // ============================================================
        // ESTADO GLOBAL MEJORADO
        // ============================================================
        let bots = [];
        let stats = {
            total_messages: 0,
            total_raids: 0,
            total_bots: 0,
            active_workers: 0
        };
        let ipLogs = [];
        let raidActive = false;
        let activeRaidBot = null;
        let raidInterval = null;

        // ============================================================
        // FUNCIONES MEJORADAS
        // ============================================================

        // Función para añadir bot (REAL)
        async function addBot() {
            const token = document.getElementById('botToken').value.trim();
            const name = document.getElementById('botName').value.trim() || 'Bot_ELISEO';
            
            if (!token) {
                alert('Ingresa un token de bot válido');
                return;
            }

            // Crear nueva instancia del bot
            const bot = new DiscordBot(token, name);
            
            // Intentar iniciar para verificar token
            const result = await bot.start();
            
            if (result.success) {
                bots.push(bot);
                stats.total_bots = bots.length;
                document.getElementById('botToken').value = '';
                renderBots();
                updateStats();
                addLog(`✅ Bot ${name} agregado y conectado como ${result.user.username}`);
                
                // Actualizar select de raids
                updateRaidSelect();
            } else {
                alert(`Error al conectar el bot: ${result.error}`);
                addLog(`❌ Error al agregar bot: ${result.error}`);
            }
        }

        // Función para iniciar bot (REAL)
        async function startBot(id) {
            const bot = bots.find(b => b.id === id);
            if (!bot) return;
            
            if (bot.is_running) {
                alert('El bot ya está activo');
                return;
            }

            const result = await bot.start();
            
            if (result.success) {
                addLog(`✅ Bot ${bot.name} iniciado como ${result.user.username}`);
                updateRaidSelect();
            } else {
                alert(`Error al iniciar bot: ${result.error}`);
            }
            
            renderBots();
            updateStats();
        }

        // Función para detener bot (REAL)
        async function stopBot(id) {
            const bot = bots.find(b => b.id === id);
            if (!bot) return;
            
            if (bot.isRaiding) {
                bot.stopRaid();
            }
            
            bot.stop();
            addLog(`⏹️ Bot ${bot.name} detenido`);
            updateRaidSelect();
            renderBots();
            updateStats();
        }

        // Función para eliminar bot (REAL)
        async function deleteBot(id) {
            if (!confirm('¿Estás seguro de eliminar este bot?')) return;
            
            const bot = bots.find(b => b.id === id);
            if (bot && bot.is_running) {
                bot.stop();
            }
            
            bots = bots.filter(b => b.id !== id);
            stats.total_bots = bots.length;
            
            renderBots();
            updateStats();
            updateRaidSelect();
            addLog(`🗑️ Bot eliminado`);
        }

        // Función para iniciar RAID (REAL)
        async function startRaid() {
            const botId = parseInt(document.getElementById('raidBot').value);
            const channelId = document.getElementById('raidChannel').value.trim();
            const count = parseInt(document.getElementById('raidCount').value) || 1000;
            const workers = parseInt(document.getElementById('raidWorkers').value) || 10;
            const message = document.getElementById('raidMessage').value || 'RAID MASSIVE by ELISEO v6.0 🔥';

            if (!botId || !channelId) {
                alert('Selecciona un bot y un canal');
                return;
            }

            if (raidActive) {
                alert('Ya hay un RAID en curso');
                return;
            }

            const bot = bots.find(b => b.id === botId);
            if (!bot || !bot.is_running) {
                alert('El bot no está activo');
                return;
            }

            // Iniciar RAID en el bot
            const started = bot.startRaid(channelId, message, count, workers);
            
            if (started) {
                raidActive = true;
                activeRaidBot = bot;
                stats.active_workers = workers;
                stats.total_raids++;
                updateStats();
                addLog(`🚀 RAID iniciado en canal ${channelId} con ${workers} workers usando ${bot.name}`);
                addLog(`📝 Mensaje: ${message.substring(0, 50)}...`);
                
                // Cambiar botón de estado
                document.querySelector('.raid-actions .btn-primary').innerHTML = '<i class="fas fa-spinner fa-spin"></i> RAID en curso';
            } else {
                alert('No se pudo iniciar el RAID');
            }
        }

        // Función para detener RAID (REAL)
        async function stopRaid() {
            if (!raidActive || !activeRaidBot) {
                alert('No hay ningún RAID activo');
                return;
            }
            
            activeRaidBot.stopRaid();
            raidActive = false;
            stats.active_workers = 0;
            updateStats();
            addLog('⛔ RAID detenido manualmente');
            
            document.querySelector('.raid-actions .btn-primary').innerHTML = '<i class="fas fa-play"></i> Iniciar RAID';
        }

        // Actualizar select de raids
        function updateRaidSelect() {
            const select = document.getElementById('raidBot');
            const currentValue = select.value;
            
            const activeBots = bots.filter(b => b.status === 'active' && b.is_running);
            select.innerHTML = '<option value="">Seleccionar Bot</option>' + 
                activeBots.map(b => `<option value="${b.id}">${b.name} (${b.user ? b.user.username : 'Desconocido'})</option>`).join('');
            
            if (currentValue) {
                select.value = currentValue;
            }
        }

        // Función para detectar IP (mejorada con API real)
        async function detectIP() {
            const ip = document.getElementById('ipToCheck').value.trim() || '187.189.120.235';
            
            try {
                // Usar API de ipinfo.io para geolocalización real
                const response = await fetch(`https://ipinfo.io/${ip}/json`);
                
                if (!response.ok) {
                    throw new Error('Error al obtener información');
                }
                
                const data = await response.json();
                
                // Mostrar resultado
                const resultDiv = document.getElementById('ipResult');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <div><strong>IP:</strong> <span style="color: #00ccff;">${data.ip || ip}</span></div>
                        <div><strong>País:</strong> ${data.country || 'Desconocido'}</div>
                        <div><strong>Ciudad:</strong> ${data.city || 'Desconocida'}</div>
                        <div><strong>ISP:</strong> ${data.org || 'Desconocido'}</div>
                        <div><strong>Coord:</strong> ${data.loc || '0,0'}</div>
                        <div><strong>Zona:</strong> ${data.timezone || 'Desconocida'}</div>
                    </div>
                `;

                // Añadir a logs de IP
                addIPLog(
                    data.ip || ip, 
                    data.country || 'Desconocido', 
                    data.city || 'Desconocida', 
                    data.org || 'Desconocido'
                );
                addLog(`🌐 IP detectada: ${ip} (${data.country || 'Desconocido'})`);
            } catch (error) {
                // Fallback a datos simulados
                const mockData = {
                    '187.189.120.235': {
                        country: 'México',
                        city: 'Ciudad de México',
                        org: 'Telmex',
                        loc: '19.4326,-99.1332'
                    },
                    '8.8.8.8': {
                        country: 'Estados Unidos',
                        city: 'Mountain View',
                        org: 'Google LLC',
                        loc: '37.422,-122.084'
                    },
                    '1.1.1.1': {
                        country: 'Australia',
                        city: 'Sydney',
                        org: 'Cloudflare',
                        loc: '-33.8688,151.2093'
                    }
                };

                const geo = mockData[ip] || {
                    country: 'Desconocido',
                    city: 'Desconocida',
                    org: 'Desconocido',
                    loc: '0,0'
                };

                const resultDiv = document.getElementById('ipResult');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                        <div><strong>IP:</strong> <span style="color: #00ccff;">${ip}</span></div>
                        <div><strong>País:</strong> ${geo.country}</div>
                        <div><strong>Ciudad:</strong> ${geo.city}</div>
                        <div><strong>ISP:</strong> ${geo.org}</div>
                        <div><strong>Coord:</strong> ${geo.loc}</div>
                        <div><strong>Riesgo:</strong> <span style="color: ${Math.random() > 0.5 ? '#00ff88' : '#ff4444'}">${Math.floor(Math.random() * 100)}%</span></div>
                    </div>
                `;

                addIPLog(ip, geo.country, geo.city, geo.org);
                addLog(`🌐 IP detectada: ${ip} (${geo.country})`);
            }
            
            document.getElementById('ipToCheck').value = '';
        }

        // ============================================================
        // FUNCIONES AUXILIARES
        // ============================================================

        function addLog(message) {
            const logs = document.getElementById('systemLogs');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="time">[${time}]</span> <span class="msg">${message}</span>`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }

        function addIPLog(ip, country, city, isp) {
            const container = document.getElementById('ipLogs');
            const entry = document.createElement('div');
            entry.className = 'ip-log';
            entry.innerHTML = `
                <span class="ip">${ip}</span>
                <span class="country">${country} - ${city}</span>
                <span style="font-size: 11px; color: #666;">${isp}</span>
            `;
            container.insertBefore(entry, container.firstChild);
            if (container.children.length > 10) {
                container.removeChild(container.lastChild);
            }
        }

        function updateStats() {
            document.getElementById('totalMessages').textContent = stats.total_messages;
            document.getElementById('totalRaids').textContent = stats.total_raids;
            document.getElementById('totalBots').textContent = stats.total_bots;
            document.getElementById('activeWorkers').textContent = stats.active_workers;
            document.getElementById('workersCount').textContent = stats.active_workers;
            document.getElementById('botsCount').textContent = stats.total_bots;
        }

        function renderBots() {
            const container = document.getElementById('botList');
            if (bots.length === 0) {
                container.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">No hay bots registrados</div>';
                return;
            }

            container.innerHTML = bots.map(bot => `
                <div class="bot-item">
                    <div class="info">
                        <span class="name">${bot.name}</span>
                        <span class="token">${bot.token.substring(0, 15)}...</span>
                        <span class="bot-status ${bot.status}">${bot.status}</span>
                        ${bot.is_running ? `<span style="color: #00ff88; font-size: 12px;"><i class="fas fa-circle"></i> ${bot.guilds.length} servidores</span>` : ''}
                        ${bot.isRaiding ? `<span style="color: #ffaa00; font-size: 12px;"><i class="fas fa-bolt"></i> RAID activo</span>` : ''}
                    </div>
                    <div>
                        ${bot.status === 'inactive' || bot.status === 'error' ? 
                            `<button class="btn btn-primary btn-sm" onclick="startBot(${bot.id})"><i class="fas fa-play"></i></button>` :
                            `<button class="btn btn-warning btn-sm" onclick="stopBot(${bot.id})"><i class="fas fa-stop"></i></button>`
                        }
                        <button class="btn btn-danger btn-sm" onclick="deleteBot(${bot.id})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        function init() {
            addLog('🚀 ELISEO v6.0 ZONAHACK cargado');
            addLog('📡 Sistema de bots de Discord activo');
            addLog('🌐 Detección de IP mediante ipinfo.io');
            
            // Ejemplos de IP
            addIPLog('187.189.120.235', 'México', 'Ciudad de México', 'Telmex');
            addIPLog('8.8.8.8', 'Estados Unidos', 'Mountain View', 'Google LLC');
            
            // Estadísticas iniciales
            stats.total_messages = 45231;
            stats.total_raids = 12;
            updateStats();
            
            updateRaidSelect();
        }

        // Auto-refresh
        setInterval(() => {
            if (!raidActive) {
                stats.total_messages += Math.floor(Math.random() * 3);
                updateStats();
            }
        }, 5000);

        // Iniciar
        init();

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Permitir Enter en campos de entrada
            document.getElementById('botToken').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addBot();
            });
            
            document.getElementById('ipToCheck').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') detectIP();
            });
        });
    </script>
</body>
</html>
